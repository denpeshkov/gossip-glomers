apiVersion: v1
kind: Service
metadata:
  name: go-template
spec:
  selector:
    app: go-template
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-template
  template:
    metadata:
      labels:
        app: go-template
    spec:
      os:
        name: linux
      containers:
        - name: go-template
          image: go-template
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
